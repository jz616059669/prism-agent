name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install uv
      - name: Create virtualenv
        run: uv venv
      - name: Install dependencies
        run: |
          python -m pip install -e .
          python -m pip install pytest pytest-timeout playwright nest-asyncio
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium
      - name: Version check
        run: python scripts/check_version.py
      - name: Run tests
        run: python -m pytest tests/ -q --timeout=120
        env:
          PRISM_SKIP_UPDATE_CHECK: "1"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Create virtualenv
        run: uv venv
      - name: Install dependencies
        run: uv pip install ruff
      - name: Ruff
        run: ruff check prism/ tests/
        continue-on-error: true
      - name: Syntax check
        run: |
          python -m py_compile prism/*.py prism/**/*.py prism/**/**/*.py tests/*.py || true
          python -c "import ast, pathlib; [ast.parse(path.read_text(encoding='utf-8')) for path in pathlib.Path('prism').rglob('*.py')]; print('syntax ok')"
      - name: Import smoke check
        run: |
          python -c "import prism.config; print('config import ok')" || true
          python -c "from prism.tools.registry import registry; print('registry import ok, tools=', len(registry._tools))" || true
          python -c "from prism.gateway.feishu import FeishuAdapter; print('feishu import ok')" || true

  desktop-smoke:
    name: Desktop smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Create virtualenv
        run: uv venv
      - name: Install dependencies
        run: |
          uv pip install -e ".[desktop]"
          uv pip install pytest
      - name: Desktop syntax check
        run: python -c "import ast; ast.parse(open('prism-desktop/prism_desktop/main.py', encoding='utf-8').read()); print('desktop syntax ok')"
