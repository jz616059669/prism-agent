# PRISM Agent 示例配置

# 模型提供商
providers:
  stepfun:
    base_url: "https://api.stepfun.com/step_plan/v1"
    api_key: "YOUR_STEPFUN_API_KEY"
    model: "step-3.7-flash"

  openai:
    base_url: "https://api.openai.com/v1"
    api_key: "YOUR_OPENAI_API_KEY"
    model: "gpt-4o"

# 主模型与降级链
model:
  default: "step-3.7-flash"
  provider: "stepfun"
  base_url: "https://api.stepfun.com/step_plan/v1"

fallback:
  chain:
    - "stepfun/step-3.7-flash"
    - "openai/gpt-4o"

# Gateway
gateway:
  telegram:
    token: ""
  feishu:
    app_id: ""
    app_secret: ""
    encrypt_key: ""
    verification_token: ""

# MCP
mcpServers:
  filesystem:
    transport: "stdio"
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "C:/Users/zd"
    enabled: true
