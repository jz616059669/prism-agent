model:
  provider: stepfun
  base_url: https://api.stepfun.com/step_plan/v1
  api_key: ""
  model.default: step-3.7-flash

gateway:
  platforms: []

# Hooks 系统配置（借鉴 Codex CLI）
# 在关键节点注入自定义逻辑
hooks:
  - name: "log-all-chats"
    event: "after_chat"
    pattern: "*"
    action: "run"
    command: "echo '[PRISM] chat completed' >> ~/.prism/logs/hooks.log"
    timeout: 5

  - name: "block-dangerous-commands"
    event: "before_command"
    pattern: "rm -rf *"
    action: "block"
    command: "False"  # 阻止危险命令
    timeout: 5

  - name: "validate-before-write"
    event: "before_file_write"
    pattern: "*.py"
    action: "run"
    command: "python -m py_compile {file}"
    timeout: 10

# Workspace 配置（借鉴 OpenClaw）
workspaces:
  - name: "default"
    path: "~/.prism/sessions"
    description: "Default workspace"
    tags: ["main"]
